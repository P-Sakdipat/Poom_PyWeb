<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Sales War Room</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">🔥 Sales War Room Dashboard 🔥</h2>
    
    <div class="row mb-4 text-center">
        <div class="col-md-6">
            <div class="card bg-primary text-white shadow">
                <div class="card-body">
                    <h5>Total Sales (ยอดขายรวม)</h5>
                    <h3 id="kpiTotalSales">กำลังโหลด...</h3>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card bg-success text-white shadow">
                <div class="card-body">
                    <h5>Total Orders (จำนวนออเดอร์)</h5>
                    <h3 id="kpiTotalOrders">กำลังโหลด...</h3>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <canvas id="salesChart" height="100"></canvas>
        </div>
    </div>
</div>

<script>
    const ctx = document.getElementById('salesChart').getContext('2d');
    let salesChart;

    async function fetchAndUpdateData() {
        try {
            const response = await fetch('/api/data/'); 
            const jsonData = await response.json();

            // ✅ 1. ย้ายการอัปเดตตัวเลข KPIs เข้ามาในนี้ (หลังจากได้ jsonData แล้ว)
            document.getElementById('kpiTotalSales').innerText = jsonData.kpis.total_sales;
            document.getElementById('kpiTotalOrders').innerText = jsonData.kpis.total_orders;

            // ✅ 2. อัปเดตกราฟ
            if (salesChart) {
                salesChart.data.labels = jsonData.labels;
                salesChart.data.datasets[0].data = jsonData.data;
                salesChart.update();
            } else {
                salesChart = new Chart(ctx, {
                    type: 'bar', 
                    data: {
                        labels: jsonData.labels,
                        datasets: [{
                            label: 'ยอดขายรายสินค้า',
                            data: jsonData.data,
                            backgroundColor: 'rgba(54, 162, 235, 0.6)',
                            borderColor: 'rgba(54, 162, 235, 1)',
                            borderWidth: 1
                        }]
                    },
                    options: { animation: { duration: 500 } }
                });
            }
        } catch (error) {
            console.error("Error fetching data: ", error);
            // แจ้งเตือนกรณีเกิด Error
            document.getElementById('kpiTotalSales').innerText = "เกิดข้อผิดพลาด";
            document.getElementById('kpiTotalOrders').innerText = "เกิดข้อผิดพลาด";
        }
    }

    fetchAndUpdateData();
    // อัปเดตกราฟอัตโนมัติทุก 5 วินาที
    setInterval(fetchAndUpdateData, 5000); 
</script>

</body>
</html>
